<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Model and Card</title>
    <style>

        body {
            background-color: peru;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        h1 {
            color: rgb(0, 123, 255);
            text-align: center;
        }

        p {
            font-size: 20px;
        }

        .box{
            background: white;
            padding: 10px;
            border-radius: 20px;
            box-shadow: 0px 4px 10px black;
            transition: 0.3s ease-in-out;
        }

        .box:hover{
            transform: translateY(-5px);
        }

        img{
            height: 200px;
            display: block;
            margin: auto;
        }

    </style>
</head>

<body>
    <div class="box">
        <h1>Aman Singh</h1>
        <p>Main Web Development Sikh raha hu!! aur main jarur sikhunga</p>

        <ol>
            <li>HTML</li>
            <li>CSS</li>
            <li>JavaScript</li>
        </ol>

        <button onclick="showMessage()">Show Message</button>
        <p id="message"></p>
        <img src="https://images.pexels.com/photos/20458192/pexels-photo-20458192.jpeg" alt="imae">
    </div>
    <script>
        function showMessage()
        {
            document.getElementById('message').innerHTML = "Hello Babu!!!";
        }
    </script>
</body>

</html>
